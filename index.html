<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Hero: Final Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; font-family: 'Inter', sans-serif; }
        #gameCanvas { background: #334155; display: block; margin: 0 auto; border-left: 8px solid #475569; border-right: 8px solid #475569; }
        .light { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #000; margin: 4px; transition: 0.3s; }
        .hud { background: rgba(15, 23, 42, 0.9); border: 1px solid #334155; padding: 10px; border-radius: 12px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="relative shadow-2xl border-[10px] border-slate-900 rounded-2xl overflow-hidden">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div class="absolute top-4 left-4 right-4 flex justify-between items-start pointer-events-none">
            <div class="flex flex-col gap-2">
                <div class="hud border-red-500 border-2">
                    <p class="text-[10px] text-slate-400 uppercase font-bold text-center">LIMIT</p>
                    <div id="limitSign" class="w-12 h-12 rounded-full border-4 border-red-600 bg-white flex items-center justify-center text-black font-black text-xl">40</div>
                </div>
            </div>
            
            <div class="flex flex-col gap-2 items-end">
                <div class="hud text-right">
                    <span id="lives" class="text-xl">❤️❤️❤️</span>
                    <p id="score" class="text-2xl font-black text-yellow-400">0</p>
                </div>
                <div class="bg-slate-900 p-2 rounded-xl border-2 border-slate-700 flex flex-col items-center">
                    <div id="redL" class="light bg-red-950"></div>
                    <div id="yellowL" class="light bg-yellow-950"></div>
                    <div id="greenL" class="light bg-green-950"></div>
                </div>
            </div>
        </div>

        <div id="overlay" class="absolute inset-0 bg-slate-900/95 flex flex-col items-center justify-center p-10 text-center">
            <h1 class="text-white text-5xl font-black mb-4 italic">FINAL<span class="text-red-500">DRIVE</span></h1>
            <ul class="text-slate-400 text-sm mb-8 space-y-2 text-left list-disc pl-5">
                <li><b>UP ARROW</b> to accelerate.</li>
                <li>Stay under the <b>Speed Limit</b>.</li>
                <li>Stop for <b>Red Lights</b>.</li>
                <li>Wait for <b>Pedestrians</b> to clear the road.</li>
            </ul>
            <button onclick="startGame()" class="bg-red-600 hover:bg-red-500 text-white px-16 py-5 rounded-full font-black transition-all shadow-xl active:scale-95">START FINAL EXAM</button>
        </div>

        <div id="quizScreen" class="hidden absolute inset-0 bg-black/98 flex flex-col items-center justify-center p-8">
            <div class="text-red-500 font-bold mb-2 animate-pulse uppercase tracking-tighter text-2xl">⚠️ 3 STRIKES! ⚠️</div>
            <p class="text-slate-300 text-center mb-8">One question to save your license. Answer wrong and it's Game Over.</p>
            <div class="w-full bg-slate-900 p-6 rounded-2xl border border-red-500/50">
                <p id="qText" class="text-white font-bold mb-6 text-lg text-center"></p>
                <div id="qOptions" class="space-y-3"></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let active = false, score = 0, speed = 0, lives = 3, frame = 0;
    let signal = 'GREEN', currentLimit = 40;
    let player = { x: 175, y: 480, w: 50, h: 85 };
    let hazard = { active: false, y: -200, pedX: -30, cleared: false };
    const keys = {};

    const questions = [
        { q: "You must stop at a Red Light even if no one is coming.", a: ["True", "False"], c: 0 },
        { q: "What should you do when a pedestrian is half-way across?", a: ["Speed up", "Wait for them to clear the road", "Honk"], c: 1 },
        { q: "Exceeding the speed limit in a school zone is...", a: ["Allowed if you're late", "A serious safety violation", "Fine if you drive well"], c: 1 }
    ];

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function startGame() {
        document.getElementById('overlay').classList.add('hidden');
        lives = 3; score = 0; speed = 0; signal = 'GREEN'; hazard.active = false;
        updateHUD(); updateSignal();
        active = true; loop();
    }

    function updateHUD() {
        document.getElementById('score').innerText = score;
        document.getElementById('lives').innerText = "❤️".repeat(lives);
        document.getElementById('limitSign').innerText = currentLimit;
    }

    function updateSignal() {
        if(!active) return;
        const sequence = { 'GREEN': ['YELLOW', 5000], 'YELLOW': ['RED', 3000], 'RED': ['GREEN', 5000] };
        const [next, time] = sequence[signal];
        signal = next;
        
        document.getElementById('redL').className = `light ${signal==='RED'?'bg-red-500 shadow-[0_0_15px_red]':'bg-red-950'}`;
        document.getElementById('yellowL').className = `light ${signal==='YELLOW'?'bg-yellow-500 shadow-[0_0_15px_yellow]':'bg-yellow-950'}`;
        document.getElementById('greenL').className = `light ${signal==='GREEN'?'bg-green-500 shadow-[0_0_15px_lime]':'bg-green-950'}`;
        
        setTimeout(updateSignal, time);
    }

    function triggerViolation(msg) {
        lives--;
        updateHUD();
        speed = 0;
        hazard.active = false;
        if (lives <= 0) {
            active = false;
            showQuiz();
        } else {
            active = false;
            alert(msg + "\nStrikes Left: " + lives);
            active = true;
            loop();
        }
    }

    function showQuiz() {
        const q = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById('quizScreen').classList.remove('hidden');
        document.getElementById('qText').innerText = q.q;
        const area = document.getElementById('qOptions');
        area.innerHTML = '';
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = "w-full bg-slate-800 text-white p-4 rounded-xl hover:bg-red-600 transition font-bold";
            b.innerText = opt;
            b.onclick = () => {
                if(i === q.c) {
                    lives = 1; updateHUD();
                    document.getElementById('quizScreen').classList.add('hidden');
                    active = true; loop();
                } else { location.reload(); }
            };
            area.appendChild(b);
        });
    }

    function loop() {
        if (!active) return;
        frame++;
        ctx.fillStyle = "#334155"; ctx.fillRect(0, 0, 400, 600);

        // Movement
        if (keys['ArrowUp']) speed = Math.min(speed + 0.1, 8);
        else speed = Math.max(speed - 0.15, 0);
        if (keys['ArrowLeft'] && player.x > 15) player.x -= 4;
        if (keys['ArrowRight'] && player.x < 335) player.x += 4;

        // VIOLATION: Speed Limit
        if (speed * 10 > currentLimit + 5) { triggerViolation("SPEEDING VIOLATION!"); return; }
        
        // VIOLATION: Red Light
        if (signal === 'RED' && speed > 0.5) { triggerViolation("RED LIGHT VIOLATION!"); return; }

        // Pedestrian / Zebra System
        if (!hazard.active && (signal === 'RED' || signal === 'YELLOW')) {
            hazard.active = true; hazard.y = -150; hazard.pedX = -30; hazard.cleared = false;
            currentLimit = [30, 40, 50][Math.floor(Math.random()*3)];
        }

        if (hazard.active) {
            hazard.y += speed;
            if (hazard.pedX < 420) hazard.pedX += 2.5; // Walking across
            else hazard.cleared = true;

            // Draw Zebra
            ctx.fillStyle = "rgba(255,255,255,0.8)";
            for(let i=0; i<8; i++) ctx.fillRect(i*55, hazard.y, 35, 100);

            // Draw Man
            if (!hazard.cleared) {
                ctx.fillStyle = "#ffdbac"; ctx.fillRect(hazard.pedX, hazard.y+20, 20, 20); // Head
                ctx.fillStyle = "#1e40af"; ctx.fillRect(hazard.pedX, hazard.y+40, 20, 35); // Body
                
                // VIOLATION: Pedestrian Safety
                if (speed > 0.5 && player.y < hazard.y + 100 && player.y + player.h > hazard.y) {
                    triggerViolation("PEDESTRIAN SAFETY VIOLATION!");
                    return;
                }
            }

            if (hazard.y > 600) { hazard.active = false; score += 100; updateHUD(); }
        }

        // Draw Car
        ctx.fillStyle = "#ef4444"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "#1e293b"; ctx.fillRect(player.x+5, player.y+15, 40, 25); // Windows
        
        requestAnimationFrame(loop);
    }
</script>
</body>
</html>
